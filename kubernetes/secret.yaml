apiVersion: v1
kind: Secret
metadata:
  name: prodory-secrets
  namespace: prodory
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://postgres:changeme@postgres:5432/prodory"
  
  # Redis
  REDIS_URL: "redis://redis:6379/0"
  
  # Supabase
  SUPABASE_URL: ""
  SUPABASE_KEY: ""
  SUPABASE_JWT_SECRET: ""
  
  # AWS Credentials
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  
  # Azure Credentials
  AZURE_SUBSCRIPTION_ID: ""
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  
  # GCP Credentials
  GCP_PROJECT_ID: ""
  
  # Security
  SECRET_KEY: "change-this-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: prodory
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "changeme"
  POSTGRES_DB: "prodory"

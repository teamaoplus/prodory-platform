apiVersion: v1
kind: ServiceAccount
metadata:
  name: prodory-sa
  namespace: prodory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prodory-role
  namespace: prodory
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prodory-rolebinding
  namespace: prodory
subjects:
  - kind: ServiceAccount
    name: prodory-sa
    namespace: prodory
roleRef:
  kind: Role
  name: prodory-role
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-wide permissions for storage autoscaler
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: storage-autoscaler-clusterrole
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: storage-autoscaler-binding
subjects:
  - kind: ServiceAccount
    name: prodory-sa
    namespace: prodory
roleRef:
  kind: ClusterRole
  name: storage-autoscaler-clusterrole
  apiGroup: rbac.authorization.k8s.io

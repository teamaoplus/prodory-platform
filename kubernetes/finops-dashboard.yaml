apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-dashboard
  namespace: prodory
  labels:
    app: finops-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finops-dashboard
  template:
    metadata:
      labels:
        app: finops-dashboard
    spec:
      containers:
        - name: finops-dashboard
          image: prodory/finops-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: finops-dashboard-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: finops-dashboard
  namespace: prodory
spec:
  selector:
    app: finops-dashboard
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finops-dashboard-hpa
  namespace: prodory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finops-dashboard
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

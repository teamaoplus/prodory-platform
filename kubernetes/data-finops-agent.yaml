apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-finops-agent
  namespace: prodory
  labels:
    app: data-finops-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-finops-agent
  template:
    metadata:
      labels:
        app: data-finops-agent
    spec:
      containers:
        - name: data-finops-agent
          image: prodory/data-finops-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: prodory-config
            - secretRef:
                name: prodory-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: data-finops-agent
  namespace: prodory
spec:
  selector:
    app: data-finops-agent
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-finops-agent-hpa
  namespace: prodory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-finops-agent
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

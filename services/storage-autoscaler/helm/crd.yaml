apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: storageautoscalers.prodory.io
  labels:
    app: storage-autoscaler
    component: operator
spec:
  group: prodory.io
  names:
    plural: storageautoscalers
    singular: storageautoscaler
    kind: StorageAutoscaler
    shortNames:
      - sa
      - autoscaler
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                enabled:
                  type: boolean
                  default: true
                  description: Enable or disable the autoscaler
                selector:
                  type: object
                  additionalProperties:
                    type: string
                  description: Label selector for PVCs to monitor
                storageClasses:
                  type: array
                  items:
                    type: string
                  description: List of storage classes to monitor (empty = all)
                excludeNamespaces:
                  type: array
                  items:
                    type: string
                  default:
                    - kube-system
                    - kube-public
                    - kube-node-lease
                  description: Namespaces to exclude from monitoring
                policy:
                  type: object
                  properties:
                    thresholdPercent:
                      type: integer
                      minimum: 1
                      maximum: 99
                      default: 80
                      description: Storage usage threshold percentage to trigger scaling
                    scaleFactor:
                      type: number
                      minimum: 1.1
                      maximum: 10.0
                      default: 1.5
                      description: Factor to multiply current size by when scaling
                    maxSize:
                      type: string
                      default: "1Ti"
                      description: Maximum size limit for PVCs
                    minSize:
                      type: string
                      default: "1Gi"
                      description: Minimum size for PVCs
                    cooldownMinutes:
                      type: integer
                      minimum: 5
                      default: 60
                      description: Cooldown period between scaling operations
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Active
                    - Failed
                    - Disabled
                lastScaleTime:
                  type: string
                  format: date-time
                totalScalingOperations:
                  type: integer
                monitoredPVCs:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Threshold
          type: string
          jsonPath: .spec.policy.thresholdPercent
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp

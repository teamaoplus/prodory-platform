apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "storage-autoscaler.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "storage-autoscaler.labels" . | nindent 4 }}
{{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "storage-autoscaler.fullname" . }}
  labels:
    {{- include "storage-autoscaler.labels" . | nindent 4 }}
rules:
  # Core PVC operations
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups: [""]
    resources:
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - create
      - patch
  # Storage class access
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch
  # Custom resource operations
  - apiGroups: ["prodory.io"]
    resources:
      - storageautoscalers
      - storageautoscalers/status
      - storageautoscalers/finalizers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Metrics access
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "storage-autoscaler.fullname" . }}
  labels:
    {{- include "storage-autoscaler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "storage-autoscaler.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "storage-autoscaler.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vm-to-container
          cache-to: type=gha,mode=max,scope=vm-to-container

  # Update Docker Hub description
  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs:
      - build-finops-dashboard
      - build-data-finops-agent
      - build-k8s-in-a-box
      - build-storage-autoscaler
      - build-cloud-sentinel
      - build-vmware-migration
      - build-vm-to-container
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_PREFIX }}/prodory-platform
          readme-filepath: ./README.md
